name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel-in-progress está en false porque el sync workflow commitea
  # a main con frecuencia. Con `true` y `group: ci-main`, cada sync
  # commit cancela el CI del anterior y termina haciendo que nunca
  # termine uno. No es un problema en PRs porque cada uno tiene su
  # propio ref. Si querés mantener la cancelación agresiva en PRs,
  # separar el group por evento (`ci-pr-${{ github.event.pull_request.number }}`).
  cancel-in-progress: false

jobs:
  # Cheap gate that decides whether the test suite needs to run. The
  # sync-official-results action commits every 15 min during match
  # windows and only touches public/official/worldcup-2026-results.json
  # — running lint/typecheck/vitest/build/e2e on each of those is
  # wasted compute, so we skip the heavy jobs when only that file
  # changed.
  #
  # Implemented as conditional jobs (not `paths-ignore` at the trigger)
  # so the workflow still completes successfully and the downstream
  # deploy workflow_run still fires. Deploy has its own mirror of this
  # gate (see .github/workflows/deploy.yml → detect-data-only) and will
  # skip the Pages re-publish when only the JSON changed — the JSON is
  # served from the raw URL at runtime, so dist/ does not change.
  detect-data-only:
    name: Detect data-only commit
    runs-on: ubuntu-latest
    outputs:
      data-only: ${{ steps.check.outputs.data-only }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full fetch so we can diff against github.event.before on PRs
          # (where the base can be arbitrarily deep).
          fetch-depth: 0
      - id: check
        run: |
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          # First-ever push to a branch (no parent). Run tests — there's
          # nothing to diff against and skipping would silently green-light
          # an unknown changeset.
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "data-only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NON_DATA=$(git diff --name-only "$BASE" "$HEAD" \
            | grep -v '^public/official/worldcup-2026-results.json$' \
            || true)
          if [ -z "$NON_DATA" ]; then
            echo "data-only=true" >> "$GITHUB_OUTPUT"
            echo "Only public/official/worldcup-2026-results.json changed — skipping test suite."
          else
            echo "data-only=false" >> "$GITHUB_OUTPUT"
            echo "Non-data changes detected — running full suite."
          fi

  quality:
    needs: detect-data-only
    if: needs.detect-data-only.outputs.data-only != 'true'
    name: Lint · Typecheck · Unit tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + component tests (coverage)
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

      - name: Build
        run: npm run build

  e2e:
    needs: detect-data-only
    if: needs.detect-data-only.outputs.data-only != 'true'
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore