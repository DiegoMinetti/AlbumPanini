name: Sync official WC26 results

# Sincroniza los resultados oficiales del Mundial 2026 desde openfootball y
# los commitea a public/official/worldcup-2026-results.json para que el
# frontend (PR3) los descargue al abrir el fixture.
#
# Fuente: https://github.com/openfootball/worldcup.json/blob/master/2026/worldcup.json
#   - JSON estático en GitHub, sin auth, sin rate limit. La comunidad lo
#     mantiene a partir de comunicados oficiales FIFA.
#   - Se descarga con un único fetch por run (gratis).
#   - Sólo emite partidos con `score.ft` ya cargado.
#
# Ventana de corrida: 13hs–02hs Arg (= 16:00–05:00 UTC), el mismo
# rango en el que hay partidos del Mundial. window_dispatch permite
# un run manual.
#
# Nota sobre API_FOOTBALL_KEY: ya no se usa (openfootball es sin auth),
# pero mantenemos el secret opcional por compat con runs viejos.

on:
  schedule:
    # Bump de hourly → cada 15 min en la ventana de partidos para bajar
    # la latencia entre el FT real y la disponibilidad del JSON en el
    # frontend. openfootball no tiene rate limit así que el costo extra
    # de runs (14 → 56/día) es despreciable. Lag esperado después del
    # FT: 0-15 min (antes 0-60 min).
    - cron: '*/15 16-23 * * *'
    - cron: '*/15 0-5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Usamos un PAT (GH_PAT) en vez del GITHUB_TOKEN por defecto
          # porque los pushes hechos con GITHUB_TOKEN NO disparan
          # workflows downstream (CI/deploy), por diseño de GitHub
          # para evitar loops recursivos. Con un PAT, cada sync
          # commit sí dispara el CI, que a su vez dispara el deploy.
          token: ${{ secrets.GH_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: enrichment/pnpm-lock.yaml

      - name: Install enrichment deps
        working-directory: enrichment
        run: pnpm install --frozen-lockfile

      - name: Run sync (dry-run first to check)
        id: dry
        working-directory: enrichment
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY || 'unused' }}
        run: ./node_modules/.bin/tsx src/sync-official-results.ts --dry-run > /tmp/official.json
        continue-on-error: true

      - name: Decide whether to commit
        id: decide
        run: |
          if [ ! -s /tmp/official.json ]; then
            echo "should_commit=false" >> "$GITHUB_OUTPUT"
            echo "Dry-run falló o devolvió vacío — saliendo sin commit."
            exit 0
          fi
          # Detección de errores: si el payload empieza con "Error" (CLI
          # entry catch) o no es JSON válido, salimos sin commitear.
          if head -1 /tmp/official.json | grep -q '^Error'; then
            echo "should_commit=false" >> "$GITHUB_OUTPUT"
            echo "Sync lanzó error — saliendo sin commit."
            exit 0
          fi
          if ! head -1 /tmp/official.json | grep -q '^{'; then
            echo "should_commit=false" >> "$GITHUB_OUTPUT"
            echo "Payload no es JSON — saliendo sin commit."
            exit 0
          fi
          echo "should_commit=true" >> "$GITHUB_OUTPUT"

      - name: Write results JSON
        if: steps.decide.outputs.should_commit == 'true'
        working-directory: enrichment
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY || 'unused' }}
        run: ./node_modules/.bin/tsx src/sync-official-results.ts

      - name: Commit if changed
        if: steps.decide.outputs.should_commit == 'true'
        env:
          # Mismo motivo que en el checkout: el push debe hacerse con
          # un PAT (no con GITHUB_TOKEN) para que GitHub dispare los
          # workflows downstream (CI + deploy) en cada sync.
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/official/worldcup-2026-results.json
          if git diff --cached --quiet; then
            echo "Sin cambios — nada que commitear."
          else
            git commit -m "chore(official): sync WC26 results from openfootball ($(date -u +%FT%TZ))"
            git push
          fi
