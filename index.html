<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="Offline-first sticker collection tracker. Manage albums, inventory, exchanges and statistics entirely on your device."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Panini Collection Tracker</title>
    <script>
      // Apply persisted theme before first paint to avoid flash of wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('panini-settings');
          var mode = stored ? JSON.parse(stored)?.state?.theme : 'system';
          var dark =
            mode === 'dark' ||
            ((!mode || mode === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>This application requires JavaScript to run.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
